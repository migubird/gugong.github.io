<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乾清宫 - 故宫知识图谱</title>
  <style>
    * {{ margin: 0; padding: 0; box-sizing: border-box; }}
    body {{ font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #faf8f3; color: #2c2c2c; min-height: 100vh; font-size: 16px; }}
    header {{ background: linear-gradient(135deg, #fff8ee 0%, #f0e6cc 100%); padding: 1.5rem 2rem; border-bottom: 2px solid #b8860b; }}
    header a {{ color: #2563a8; text-decoration: none; }}
    header a:hover {{ text-decoration: underline; }}
    .nav {{ display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; flex-wrap: wrap; }}
    h1 {{ color: #b8860b; font-size: 1.8rem; }}
    .container {{ max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }}
    .meta {{ display: grid; grid-template-columns: 100px 1fr; gap: 6px 12px; font-size: 15px; margin: 1rem 0; }}
    .meta-label {{ color: #888; }}
    .meta-value {{ color: #2c2c2c; }}
    .desc {{ font-size: 17px; line-height: 1.8; color: #555; margin: 1rem 0; }}
    h2 {{ color: #b8860b; font-size: 1.3rem; margin: 1.5rem 0 0.8rem; padding-bottom: 6px; border-bottom: 1px solid #d4c9b5; }}
    ul {{ padding-left: 1.5rem; }}
    li {{ margin: 0.5rem 0; line-height: 1.6; font-size: 15px; }}
    strong {{ color: #2c2c2c; }}
    .badge {{ display: inline-block; background: #c9a01733; color: #c9a017; padding: 2px 8px; border-radius: 4px; font-size: 13px; margin-right: 6px; }}
    .note {{ color: #888; font-size: 14px; }}
    .event-card {{ background: #fff; border: 1px solid #d4c9b5; border-radius: 6px; padding: 12px; margin: 8px 0; }}
    .event-card .ename {{ color: #e74c3c; font-weight: bold; font-size: 16px; }}
    .event-card .edesc {{ color: #666; line-height: 1.5; }}
    .event-card .eyear {{ color: #888; font-size: 13px; margin-top: 4px; }}
    .link-list a {{ color: #2563a8; text-decoration: none; }}
    .link-list a:hover {{ text-decoration: underline; }}
    @media (max-width: 600px) {{
      h1 {{ font-size: 1.4rem; }}
      .container {{ padding: 0 1rem; }}
      .meta {{ grid-template-columns: 80px 1fr; font-size: 14px; }}
      .desc {{ font-size: 15px; }}
      li {{ font-size: 14px; }}
    }}
  </style>
</head>
<body>
<header>
  <div class="nav">
    <a href="../../">&#8592; 返回主页</a>

  <h1>乾清宫</h1>
</header>
<div class="container">
<div class="desc">明代至清初皇帝的寝宫和处理日常政务之所。清康熙前为皇帝寝宫，雍正后移至养心殿。"正大光明"匾后曾藏立储密匣。</div><div class="meta"><span class="meta-label">类别</span><span class="meta-value">内廷后寝</span><span class="meta-label">始建</span><span class="meta-value">1420年</span><span class="meta-label">朝代</span><span class="meta-value">明清</span><span class="meta-label">地位</span><span class="meta-value">皇帝寝宫（清初前），理政中心</span><span class="meta-label">尺寸</span><span class="meta-value">45.3m x 21.6m, 高20.0m</span></div><h2>相关人物</h2><ul><li><span class="badge">执政于</span><strong>明成祖朱棣</strong> <span class="note">（1420-1424）</span></li><li><span class="badge">居住于</span><strong>明世宗朱厚熜</strong> <span class="note">（1521-1566）</span></li><li><span class="badge">居住于</span><strong>明神宗朱翊钧</strong> <span class="note">（1572-1620）</span></li><li><span class="badge">居住于</span><strong>明思宗朱由检</strong> <span class="note">（1627-1644）</span></li><li><span class="badge">居住于</span><strong>清圣祖玄烨</strong> <span class="note">（1662-1722）</span></li></ul>
</div>
</body>
</html>
